name: build-master

on:
  push:
    branches:
      - master

jobs:
  linux-deb:
    name: Linux build
    runs-on: ubuntu-24.04

    env:
      BUILD_DIR: build
      QT_VERSION: 6.8.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract project version
        id: version
        shell: bash
        run: |
          VERSION="$(grep -E '^project\(QtEasyTier VERSION ' CMakeLists.txt | sed -E 's/.*VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
          if [ -z "$VERSION" ]; then
            echo "Failed to extract version from CMakeLists.txt"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build git bash dpkg-dev \
            libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libfontconfig1-dev libdbus-1-dev libfreetype6-dev \
            libx11-dev libxcb1-dev libxext-dev libxfixes-dev libxi-dev \
            libxrender-dev libxcb-glx0-dev libxcb-keysyms1-dev \
            libxcb-image0-dev libxcb-shm0-dev libxcb-icccm4-dev \
            libxcb-sync-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-randr0-dev libxcb-render-util0-dev libxcb-util-dev \
            libxcb-cursor-dev libxcb-xinerama0-dev libxcb-xkb-dev \
            libxcb-xinput-dev libegl1-mesa-dev libgles2-mesa-dev \
            libglu1-mesa-dev libpng-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: linux_gcc_64

      - name: Show Qt version
        run: |
          qmake -query QT_VERSION
          qmake -query QT_INSTALL_PREFIX

      - name: Configure
        run: |
          cmake -S . -B "$BUILD_DIR" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR"

      - name: Build
        run: |
          cmake --build "$BUILD_DIR" --parallel "$(nproc)"

      - name: Build deb package
        working-directory: ${{ github.workspace }}/build/Output
        run: |
          bash "${{ github.workspace }}/assets/package/linux/build_deb.sh" \
            -v "${{ steps.version.outputs.version }}"

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: qteasytier-v${{ steps.version.outputs.version }}-linux-amd64
          path: build/Output/qteasytier_v${{ steps.version.outputs.version }}_linux_amd64.deb
          if-no-files-found: error
