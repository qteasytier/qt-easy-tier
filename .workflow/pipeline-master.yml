version: '1.0'
name: pipeline-master
displayName: pipeline-master
triggers:
  trigger: auto
  push:
    branches:
      precise:
        - master
stages:
  - name: stage-159cd4c0
    displayName: 未命名
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: build@gcc
        name: build_gcc
        displayName: GCC 构建
        gccVersion: '15.2'
        commands:
          - '#!/usr/bin/env bash'
          - set -euo pipefail
          - ''
          - QT_VERSION="${QT_VERSION:-6.8.3}"
          - QT_DIR="${QT_DIR:-$HOME/Qt}"
          - QT_PATH="${QT_DIR}/${QT_VERSION}/gcc_64"
          - BUILD_DIR="${BUILD_DIR:-build}"
          - JOBS="${JOBS:-$(nproc)}"
          - ''
          - apt-get update -qq
          - apt-get install -y -qq python3 python3-pip build-essential \
          - '    libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-dev \'
          - '    libfontconfig1-dev libdbus-1-dev libfreetype6-dev \'
          - '    libx11-dev libxcb1-dev libxext-dev libxfixes-dev libxi-dev \'
          - '    libxrender-dev libxcb-glx0-dev libxcb-keysyms1-dev \'
          - '    libxcb-image0-dev libxcb-shm0-dev libxcb-icccm4-dev \'
          - '    libxcb-sync-dev libxcb-xfixes0-dev libxcb-shape0-dev \'
          - '    libxcb-randr0-dev libxcb-render-util0-dev libxcb-util-dev \'
          - '    libxcb-cursor-dev libxcb-xinerama0-dev libxcb-xkb-dev \'
          - '    libxcb-xinput-dev libegl1-mesa-dev libgles2-mesa-dev \'
          - '    libglu1-mesa-dev libpng-dev git'
          - ''
          - if [ ! -d "$QT_PATH" ]; then
          - '    pip3 install -q -i https://mirrors.huaweicloud.com/repository/pypi/simple/ --trusted-host mirrors.huaweicloud.com aqtinstall'
          - '    mkdir -p "$QT_DIR"'
          - '    aqt install-qt linux desktop "$QT_VERSION" gcc_64 -O "$QT_DIR"'
          - fi
          - ''
          - export CMAKE_PREFIX_PATH="$QT_PATH"
          - ''
          - cmake -S . -B "$BUILD_DIR" \
          - '    -DCMAKE_BUILD_TYPE=Release \'
          - '    -DCMAKE_PREFIX_PATH="$QT_PATH"'
          - ''
          - cmake --build "$BUILD_DIR" --parallel "$JOBS"
          - cmake --install "$BUILD_DIR"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./build/Output
        caches: []
        notify: []
        strategy:
          retry: '0'
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        notify: []
        strategy:
          retry: '0'
        dependsOn: build_gcc
